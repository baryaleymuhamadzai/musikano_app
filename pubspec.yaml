name: musikano
description: "Classical Indian Music Practice Companion — a digital instrument app for taal-based riyaz."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.0.0
  just_audio: ^0.9.39
  audio_session: ^0.1.21
  shared_preferences: ^2.2.3
  wakelock_plus: ^1.2.0
  vibration: ^2.0.0
  url_launcher: ^6.2.6
  flutter_animate: ^4.5.0
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/music-player.png"
  adaptive_icon_background: "#F4F7FB"
  adaptive_icon_foreground: "assets/images/music-player.png"

flutter:
  uses-material-design: true
  assets:
    - assets/audio/tabla/
    - assets/audio/tanpura/
    - assets/audio/swar_mandal/
